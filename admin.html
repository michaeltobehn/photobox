<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Fotobox Admin</title>
<style>
  :root {
    --bg: #14161a; --panel: #1c1f25; --line: #2b2f37;
    --txt: #e6e8ec; --mut: #8a919e; --acc: #4f7cff; --red: #e5484d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--txt); min-height: 100vh; padding: 24px;
  }
  header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
  h1 { font-size: 1.15rem; font-weight: 600; }
  p.sub { color: var(--mut); font-size: 0.83rem; margin-top: 2px; }
  input {
    background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    color: var(--txt); font-size: 0.9rem; padding: 8px 12px; outline: none;
  }
  input:focus { border-color: var(--acc); }
  #pw { width: 170px; }
  .panel {
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px;
  }
  .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .lbl {
    color: var(--mut); font-size: 0.72rem; text-transform: uppercase;
    letter-spacing: 0.06em; margin-right: 2px; white-space: nowrap;
  }
  .divider { width: 1px; align-self: stretch; background: var(--line); margin: 0 8px; }
  button {
    background: #262a31; border: 1px solid var(--line); border-radius: 8px;
    color: var(--txt); font-size: 0.88rem; font-weight: 500;
    padding: 8px 14px; cursor: pointer;
  }
  button:hover { border-color: #3a404b; }
  button.primary { background: var(--acc); border-color: var(--acc); color: #fff; }
  button.dngr { color: var(--red); }
  button.dngr:hover { border-color: var(--red); }
  button:disabled { opacity: 0.35; cursor: default; }
  #status { color: var(--mut); font-size: 0.85rem; margin: 2px 0 12px; min-height: 1.2em; }
  #grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px;
  }
  .ph {
    position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 1;
    background: #20242b; cursor: pointer; border: 1px solid var(--line);
  }
  .ph img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .ph .check {
    position: absolute; top: 6px; left: 6px; width: 22px; height: 22px;
    border-radius: 50%; background: rgba(10,12,16,0.65); border: 1.5px solid rgba(255,255,255,0.7);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; color: #fff;
  }
  .ph.sel { outline: 2px solid var(--acc); outline-offset: -2px; }
  .ph.sel .check { background: var(--acc); border-color: var(--acc); }
  .ph time {
    position: absolute; bottom: 0; left: 0; right: 0; font-size: 0.63rem;
    background: rgba(10,12,16,0.65); padding: 3px 6px; color: #c8cdd6;
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>Fotobox Admin</h1>
    <p class="sub">Löschen ist endgültig (inkl. Druckkarte). Archivieren verschiebt nach archiv/ — raus aus Galerie &amp; Slideshow, nichts geht verloren.</p>
  </div>
  <input id="pw" type="password" placeholder="Admin-Passwort" autocomplete="current-password">
</header>

<div class="panel">
  <div class="row">
    <span class="lbl">Event</span>
    <input id="slug" type="text" value="sabrinas-geburtstag" style="width:220px">
    <button class="primary" id="loadBtn">Laden</button>
    <button id="selAllBtn">Alle an/abwählen</button>
  </div>
  <div class="row">
    <span class="lbl">Auswahl</span>
    <button id="archiveSelBtn" disabled>Ins Archiv</button>
    <button class="dngr" id="delBtn" disabled>Löschen</button>
    <span class="divider"></span>
    <span class="lbl">Ganzes Event</span>
    <button id="zipBtn">Als ZIP sichern</button>
    <button id="archiveBtn">Ins Archiv</button>
    <button class="dngr" id="purgeBtn">Löschen</button>
  </div>
</div>

<div id="status">Passwort eingeben und „Laden". Archiv ansehen: Event-Feld auf archiv/&lt;name&gt; stellen.</div>
<div id="grid"></div>

<script>
(function () {
  "use strict";
  var SUPA_URL = "https://txogtizqjaighdabqozl.supabase.co";
  var ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4b2d0aXpxamFpZ2hkYWJxb3psIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MjQ2OTgsImV4cCI6MjA5ODMwMDY5OH0.RxDQGzIdsBe3m7HCrmK47Jc6FE4JbI1XksMcksP0Ano";
  var FN = SUPA_URL + "/functions/v1/fotobox-admin";
  var BUCKET = "fotobox";

  var $ = function (id) { return document.getElementById(id); };
  var photos = [];   // { path, url, ts, sel }

  try {
    var savedPw = localStorage.getItem("fotobox_admin_pw");
    if (savedPw) $("pw").value = savedPw;
  } catch (e) {}

  function status(msg) { $("status").textContent = msg; }

  function slug() { return ($("slug").value || "").trim().replace(/\/+$/, ""); }

  function updateDelBtn() {
    var n = photos.filter(function (p) { return p.sel; }).length;
    $("delBtn").disabled = !n;
    $("delBtn").textContent = n ? "Löschen (" + n + ")" : "Löschen";
    $("archiveSelBtn").disabled = !n;
    $("archiveSelBtn").textContent = n ? "Ins Archiv (" + n + ")" : "Ins Archiv";
  }

  function render() {
    var grid = $("grid");
    grid.innerHTML = "";
    photos.forEach(function (p) {
      var d = document.createElement("div");
      d.className = "ph" + (p.sel ? " sel" : "");
      var img = document.createElement("img");
      img.loading = "lazy";
      img.src = p.url;
      d.appendChild(img);
      var c = document.createElement("div");
      c.className = "check";
      c.textContent = p.sel ? "✓" : "";
      d.appendChild(c);
      var t = document.createElement("time");
      t.textContent = p.ts ? new Date(p.ts).toLocaleString("de-DE") : "";
      d.appendChild(t);
      d.addEventListener("click", function () {
        p.sel = !p.sel;
        render();
      });
      grid.appendChild(d);
    });
    updateDelBtn();
  }

  function loadPhotos() {
    if (!slug()) { status("Bitte Event angeben."); return; }
    status("Lade …");
    fetch(SUPA_URL + "/storage/v1/object/list/" + BUCKET, {
      method: "POST",
      headers: { "apikey": ANON, "Authorization": "Bearer " + ANON, "Content-Type": "application/json" },
      body: JSON.stringify({ prefix: slug() + "/", limit: 1000, sortBy: { column: "name", order: "desc" } })
    }).then(function (r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    }).then(function (rows) {
      photos = rows.filter(function (r) { return /\.jpg$/i.test(r.name || ""); }).map(function (r) {
        var m = (r.name || "").match(/^(\d+)/);
        return {
          path: slug() + "/" + r.name,
          url: SUPA_URL + "/storage/v1/object/public/" + BUCKET + "/" + slug() + "/" + r.name,
          ts: m ? parseInt(m[1], 10) : null,
          sel: false
        };
      });
      status(photos.length + " Foto(s) in „" + slug() + "“.");
      render();
    }).catch(function (e) {
      status("Laden fehlgeschlagen: " + e.message);
    });
  }

  function adminCall(payload) {
    try { localStorage.setItem("fotobox_admin_pw", $("pw").value); } catch (e) {}
    payload.password = $("pw").value;
    return fetch(FN, {
      method: "POST",
      headers: { "apikey": ANON, "Authorization": "Bearer " + ANON, "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    }).then(function (r) {
      return r.json().then(function (j) {
        if (!r.ok) throw new Error(j.error || ("HTTP " + r.status));
        return j;
      });
    });
  }

  $("loadBtn").addEventListener("click", loadPhotos);

  $("selAllBtn").addEventListener("click", function () {
    var allSel = photos.length && photos.every(function (p) { return p.sel; });
    photos.forEach(function (p) { p.sel = !allSel; });
    render();
  });

  $("delBtn").addEventListener("click", function () {
    var sel = photos.filter(function (p) { return p.sel; });
    if (!sel.length) return;
    if (!confirm(sel.length + " Foto(s) endgültig löschen (inkl. Druckkarten)?")) return;
    status("Lösche …");
    adminCall({ action: "delete", paths: sel.map(function (p) { return p.path; }) })
      .then(function (j) {
        status((j.deleted || []).length + " Datei(en) gelöscht.");
        loadPhotos();
      })
      .catch(function (e) { status("Fehler: " + e.message); });
  });

  $("archiveSelBtn").addEventListener("click", function () {
    var sel = photos.filter(function (p) { return p.sel; });
    if (!sel.length) return;
    if (!confirm(sel.length + " Foto(s) ins Archiv verschieben?")) return;
    status("Verschiebe ins Archiv …");
    adminCall({ action: "archive", paths: sel.map(function (p) { return p.path; }) })
      .then(function (j) {
        status(j.moved + " Datei(en) ins Archiv verschoben.");
        loadPhotos();
      })
      .catch(function (e) { status("Fehler: " + e.message); });
  });

  $("archiveBtn").addEventListener("click", function () {
    if (!slug()) { status("Bitte Event angeben."); return; }
    if (slug().indexOf("archiv") === 0) { status("Ist schon im Archiv."); return; }
    if (!confirm("Ganzes Event „" + slug() + "“ ins Archiv verschieben?")) return;
    status("Verschiebe ins Archiv …");
    adminCall({ action: "archive", prefix: slug() })
      .then(function (j) {
        status(j.moved + " Datei(en) → " + j.target + " verschoben.");
        loadPhotos();
      })
      .catch(function (e) { status("Fehler: " + e.message); });
  });

  // ---------- ZIP-Download (beste Qualitaet: print/-Master, sonst Webversion) ----------
  // Minimaler ZIP-Writer (STORE, ohne Kompression — JPEGs sind schon komprimiert).
  var CRC_TABLE = (function () {
    var t = [], c, n, k;
    for (n = 0; n < 256; n++) {
      c = n;
      for (k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
      t[n] = c >>> 0;
    }
    return t;
  })();

  function crc32(u8) {
    var c = 0xFFFFFFFF;
    for (var i = 0; i < u8.length; i++) c = CRC_TABLE[(c ^ u8[i]) & 0xFF] ^ (c >>> 8);
    return (c ^ 0xFFFFFFFF) >>> 0;
  }

  function buildZip(entries) {
    var parts = [], central = [], offset = 0;
    entries.forEach(function (e) {
      var nameBytes = new TextEncoder().encode(e.name);
      var crc = crc32(e.data);
      var head = new DataView(new ArrayBuffer(30));
      head.setUint32(0, 0x04034b50, true);
      head.setUint16(4, 20, true);
      head.setUint16(8, 0, true);
      head.setUint32(14, crc, true);
      head.setUint32(18, e.data.length, true);
      head.setUint32(22, e.data.length, true);
      head.setUint16(26, nameBytes.length, true);
      parts.push(head.buffer, nameBytes, e.data);
      var cd = new DataView(new ArrayBuffer(46));
      cd.setUint32(0, 0x02014b50, true);
      cd.setUint16(4, 20, true); cd.setUint16(6, 20, true);
      cd.setUint16(10, 0, true);
      cd.setUint32(16, crc, true);
      cd.setUint32(20, e.data.length, true);
      cd.setUint32(24, e.data.length, true);
      cd.setUint16(28, nameBytes.length, true);
      cd.setUint32(42, offset, true);
      central.push(cd.buffer, nameBytes);
      offset += 30 + nameBytes.length + e.data.length;
    });
    var cdSize = central.reduce(function (s, b) { return s + (b.byteLength || b.length); }, 0);
    var eocd = new DataView(new ArrayBuffer(22));
    eocd.setUint32(0, 0x06054b50, true);
    eocd.setUint16(8, entries.length, true);
    eocd.setUint16(10, entries.length, true);
    eocd.setUint32(12, cdSize, true);
    eocd.setUint32(16, offset, true);
    return new Blob(parts.concat(central, [eocd.buffer]), { type: "application/zip" });
  }

  $("zipBtn").addEventListener("click", function () {
    if (!slug()) { status("Bitte Event angeben."); return; }
    var base = slug();
    status("Suche Dateien …");
    function list(dir) {
      return fetch(SUPA_URL + "/storage/v1/object/list/" + BUCKET, {
        method: "POST",
        headers: { "apikey": ANON, "Authorization": "Bearer " + ANON, "Content-Type": "application/json" },
        body: JSON.stringify({ prefix: dir + "/", limit: 1000, sortBy: { column: "name", order: "asc" } })
      }).then(function (r) { return r.ok ? r.json() : []; });
    }
    Promise.all([list(base), list(base + "/print")]).then(function (res) {
      var webs = res[0].filter(function (r) { return /\.jpg$/i.test(r.name || ""); });
      var prints = {};
      res[1].forEach(function (r) { if (/\.jpg$/i.test(r.name || "")) prints[r.name] = true; });
      var files = webs.map(function (r) {
        return { name: r.name, path: base + (prints[r.name] ? "/print/" : "/") + r.name };
      });
      if (!files.length) { status("Keine Fotos gefunden."); return; }
      var entries = [], done = 0;
      function next(i) {
        if (i >= files.length) {
          status("Baue ZIP …");
          var blob = buildZip(entries);
          var a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = base.replace(/\//g, "_") + "_archiv.zip";
          document.body.appendChild(a);
          a.click();
          a.remove();
          status(entries.length + " Foto(s) als ZIP geladen (" + Math.round(blob.size / 1048576) + " MB).");
          return;
        }
        fetch(SUPA_URL + "/storage/v1/object/public/" + BUCKET + "/" + files[i].path)
          .then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.arrayBuffer(); })
          .then(function (buf) {
            entries.push({ name: files[i].name, data: new Uint8Array(buf) });
            done++;
            status("Lade " + done + "/" + files.length + " …");
            next(i + 1);
          })
          .catch(function () { next(i + 1); });
      }
      next(0);
    });
  });

  $("purgeBtn").addEventListener("click", function () {
    if (!slug()) { status("Bitte Event angeben."); return; }
    if (!confirm("WIRKLICH das komplette Event „" + slug() + "“ löschen (alle Fotos + Druckkarten)?")) return;
    status("Lösche Event …");
    adminCall({ action: "purge", prefix: slug() })
      .then(function (j) {
        status(j.deletedCount + " Datei(en) gelöscht — Event ist leer.");
        loadPhotos();
      })
      .catch(function (e) { status("Fehler: " + e.message); });
  });

  // Passwort schon gespeichert? Dann direkt das Standard-Event laden.
  if ($("pw").value) loadPhotos();
})();
</script>
</body>
</html>
